
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>affogato</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #edeae3;
      --green: #073B3A;
      --green-dark: #073B3A;
      --divider: #b0a99a;
    }
    h1{
            font-family: 'Lucida Handwriting', 'Lucida Calligraphy', cursive;

    }
    body {
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lucida Handwriting', 'Lucida Calligraphy', cursive;
    }

    .card {
      background: var(--bg);
      width: 780px;
      max-width: 95vw;
      padding: 72px 80px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .brand {
      font-size: clamp(64px, 10vw, 100px);
      color: var(--green);
      letter-spacing: -1px;
      opacity: 0;
      transform: translateY(-24px);
      animation: fadeDown 0.8s cubic-bezier(.22,1,.36,1) 0.1s forwards;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--divider);
      margin: 36px 0 80px;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.5s forwards;
    }

    .tagline {
      font-family: 'Lucida Handwriting', 'Lucida Calligraphy', cursive;
      font-size: 18px;
      color: var(--green);
      opacity: 0;
      text-align: center;
      margin-bottom: 48px;
      animation: fadeIn 0.6s ease 0.7s forwards;
      letter-spacing: 0.5px;
    }

    .btn {
      font-family: 'Lucida Handwriting', 'Lucida Calligraphy', cursive;
      font-size: 22px;
      color: var(--bg);
      background: var(--green);
      border: none;
      padding: 18px 56px;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.5px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) 0.9s forwards;
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
      box-shadow: 0 4px 24px rgba(59,107,59,0.13);
    }

    .btn:hover {
      background: var(--green-dark);
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 32px rgba(59,107,59,0.22);
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
    }

    @keyframes fadeDown {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="brand">affogato</h1>
    <div class="divider"></div>
    <button class="btn" onclick="window.location.href='/login'">get started</button>
  </div>

</body>
</html>
